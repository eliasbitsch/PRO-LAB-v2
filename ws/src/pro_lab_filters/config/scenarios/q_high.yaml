# Q variation: HIGH process noise.
# The filter weakly trusts its motion model, strongly trusts measurements.
# Expected: estimate is jumpy/noisy following each /pose; covariance stays
# wide; PF particles spread aggressively per predict step.
# Truth spawn: (-8.0, -0.5, yaw=0).
/**:
  ros__parameters:
    init_distribution: gaussian
    init_x:       -8.00
    init_y:       -0.50
    init_yaw:      0.00
    init_spread_xy:  0.10
    init_spread_yaw: 0.05
    init_cov:        0.01
    num_particles:   500
    # Process noise - large means "trust the measurements"
    q_scale:        0.5
    motion_noise_v: 0.5
    motion_noise_w: 0.5
