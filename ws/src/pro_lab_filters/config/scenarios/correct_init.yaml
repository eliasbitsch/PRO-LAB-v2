# Baseline: filter is initialized AT the truth, with a small spread.
# Should converge immediately.
# Truth start = the warehouse spawn pose (x_pose/y_pose in the launch). map->odom
# is offset by the same pose so /scan aligns with /map. (0,0) = warehouse origin.
/**:
  ros__parameters:
    init_distribution: gaussian
    init_x:        0.00
    init_y:        0.00
    init_yaw:      0.00      # face +x (east)
    init_spread_xy:  0.10   # tight (10 cm) - confident
    init_spread_yaw: 0.05   # ~3°
    init_cov:        0.01   # KF/EKF P0 diagonal
    num_particles:   500
