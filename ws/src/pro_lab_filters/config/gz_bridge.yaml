# ros_gz_bridge config: maps gz transport topics <-> ROS2 topics.
# gz sim runs headless inside the same container as ROS.

# /clock intentionally NOT bridged here - spawn_tb4.launch.py's bridge
# (config: tb4_bridge.yaml) already does it. Multiple bridges publishing
# /clock cause sim_time jumps that confuse TF buffers (map flicker).

- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/imu"
  gz_topic_name: "/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name: "/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/warehouse/model/turtlebot4/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# Real ground truth straight from the Gazebo world: pose/info publishes a
# Pose_V of EVERY entity, every tick. We bridge it as TFMessage so the
# truth_relay can pick the turtlebot4 child_frame_id out and republish it
# as /ground_truth/pose. This is the ONLY source unaffected by AMCL's
# map->odom estimate (which fails in the kidnapped scenario).
- ros_topic_name: "/world/warehouse/pose/info"
  gz_topic_name: "/world/warehouse/pose/info"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# dynamic_pose only carries moving entities (the robot), not the whole
# warehouse static scene. Used by truth_relay because the bridge drops
# entity names when converting Pose_V to TFMessage - taking the first
# transform from dynamic_pose gives us the robot deterministically.
- ros_topic_name: "/world/warehouse/dynamic_pose/info"
  gz_topic_name: "/world/warehouse/dynamic_pose/info"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# OAK-D RGB camera (resolution bumped to 1280x720 in the model so ArUco
# markers stay readable across the ~7.5 m aisles). The aruco_landmark_detector
# reads marker IDs from the image; camera_info gives the intrinsics needed to
# turn a marker pixel into a bearing.
- ros_topic_name: "/rgbd_camera/image"
  gz_topic_name: "/rgbd_camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/rgbd_camera/camera_info"
  gz_topic_name: "/rgbd_camera/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS
